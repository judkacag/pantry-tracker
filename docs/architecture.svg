<svg viewBox="0 0 780 520" width="780" height="520" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <!-- Background zones -->
  <rect x="10" y="10" width="160" height="500" rx="16" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="90" y="34" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">YOUR PHONE</text>

  <rect x="200" y="10" width="360" height="500" rx="16" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="380" y="34" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">NEXT.JS APP (localhost:3001)</text>

  <rect x="590" y="10" width="180" height="500" rx="16" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="680" y="34" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">EXTERNAL</text>

  <!-- Phone -->
  <rect x="28" y="55" width="124" height="56" rx="10" fill="white" stroke="#86efac" stroke-width="1.5"/>
  <text x="90" y="79" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Mobile browser</text>
  <text x="90" y="96" text-anchor="middle" font-size="10" fill="#6b7280">PWA / Add to Home</text>

  <rect x="28" y="135" width="124" height="48" rx="10" fill="white" stroke="#86efac" stroke-width="1.5"/>
  <text x="90" y="156" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">📷 Camera</text>
  <text x="90" y="173" text-anchor="middle" font-size="10" fill="#6b7280">html5-qrcode</text>

  <!-- Pages -->
  <rect x="218" y="55" width="148" height="56" rx="10" fill="white" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="292" y="77" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">/ Inventory</text>
  <text x="292" y="94" text-anchor="middle" font-size="10" fill="#6b7280">list · consume · delete</text>

  <rect x="390" y="55" width="148" height="56" rx="10" fill="white" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="464" y="77" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">/add  Add Item</text>
  <text x="464" y="94" text-anchor="middle" font-size="10" fill="#6b7280">scan · form · save</text>

  <!-- API Routes -->
  <text x="380" y="148" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b" letter-spacing="1">API ROUTES</text>

  <rect x="218" y="158" width="140" height="44" rx="9" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="288" y="178" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">GET/POST /api/items</text>
  <text x="288" y="194" text-anchor="middle" font-size="10" fill="#3b82f6">PATCH · DELETE /[id]</text>

  <rect x="376" y="158" width="140" height="44" rx="9" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="446" y="178" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">GET /api/lookup</text>
  <text x="446" y="194" text-anchor="middle" font-size="10" fill="#3b82f6">barcode → product info</text>

  <rect x="297" y="226" width="166" height="44" rx="9" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="380" y="246" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">GET /api/cron</text>
  <text x="380" y="262" text-anchor="middle" font-size="10" fill="#3b82f6">check expiry → send email</text>

  <!-- Cron + Email -->
  <rect x="218" y="300" width="124" height="44" rx="9" fill="#fef9c3" stroke="#fde047" stroke-width="1.2"/>
  <text x="280" y="320" text-anchor="middle" font-size="11" font-weight="600" fill="#854d0e">node-cron</text>
  <text x="280" y="336" text-anchor="middle" font-size="10" fill="#a16207">08:00 daily (Berlin)</text>

  <rect x="364" y="300" width="124" height="44" rx="9" fill="#fef9c3" stroke="#fde047" stroke-width="1.2"/>
  <text x="426" y="320" text-anchor="middle" font-size="11" font-weight="600" fill="#854d0e">Nodemailer</text>
  <text x="426" y="336" text-anchor="middle" font-size="10" fill="#a16207">SMTP email</text>

  <!-- DB -->
  <rect x="280" y="390" width="200" height="52" rx="10" fill="white" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="380" y="413" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">SQLite (dev.db)</text>
  <text x="380" y="430" text-anchor="middle" font-size="10" fill="#6b7280">via Prisma v7 + libsql adapter</text>

  <!-- External -->
  <rect x="606" y="158" width="148" height="44" rx="10" fill="white" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="680" y="178" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">Open Food Facts</text>
  <text x="680" y="194" text-anchor="middle" font-size="10" fill="#6b7280">name · brand · category</text>

  <rect x="606" y="300" width="148" height="44" rx="10" fill="white" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="680" y="320" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">Gmail SMTP</text>
  <text x="680" y="336" text-anchor="middle" font-size="10" fill="#6b7280">expiry notifications</text>

  <rect x="618" y="390" width="124" height="44" rx="10" fill="white" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="680" y="410" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">📬 Your inbox</text>
  <text x="680" y="426" text-anchor="middle" font-size="10" fill="#6b7280">30-day warning</text>

  <!-- Arrows -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arr-amber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <line x1="152" y1="83" x2="216" y2="83" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="152" y1="159" x2="390" y2="111" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)" stroke-dasharray="5,3"/>
  <line x1="292" y1="111" x2="288" y2="156" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="464" y1="111" x2="446" y2="156" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="516" y1="180" x2="604" y2="180" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="288" y1="202" x2="340" y2="388" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="342" y1="300" x2="380" y2="272" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-amber)"/>
  <line x1="420" y1="270" x2="426" y2="298" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="380" y1="270" x2="390" y2="388" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,3"/>
  <line x1="488" y1="322" x2="604" y2="322" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-amber)"/>
  <line x1="680" y1="344" x2="680" y2="388" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-purple)"/>

  <!-- Legend -->
  <g transform="translate(218, 462)">
    <line x1="0" y1="6" x2="24" y2="6" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>
    <text x="30" y="10" font-size="10" fill="#6b7280">user action</text>
    <line x1="100" y1="6" x2="124" y2="6" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="130" y="10" font-size="10" fill="#6b7280">data flow</text>
    <line x1="200" y1="6" x2="224" y2="6" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr-amber)"/>
    <text x="230" y="10" font-size="10" fill="#6b7280">scheduled</text>
    <line x1="300" y1="6" x2="324" y2="6" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-purple)"/>
    <text x="330" y="10" font-size="10" fill="#6b7280">external API</text>
  </g>
</svg>
