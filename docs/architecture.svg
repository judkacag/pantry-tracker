<svg viewBox="0 0 640 480" width="640" height="480" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <!-- Background zones -->
  <rect x="10" y="10" width="160" height="460" rx="16" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5"/>
  <text x="90" y="34" text-anchor="middle" font-size="11" font-weight="600" fill="#16a34a">YOUR PHONE</text>

  <rect x="190" y="10" width="300" height="460" rx="16" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="340" y="34" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">NEXT.JS APP</text>

  <rect x="510" y="10" width="120" height="200" rx="16" fill="#faf5ff" stroke="#e9d5ff" stroke-width="1.5"/>
  <text x="570" y="34" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">EXTERNAL</text>

  <!-- Phone -->
  <rect x="28" y="55" width="124" height="56" rx="10" fill="white" stroke="#86efac" stroke-width="1.5"/>
  <text x="90" y="79" text-anchor="middle" font-size="12" font-weight="600" fill="#15803d">Mobile browser</text>
  <text x="90" y="96" text-anchor="middle" font-size="10" fill="#6b7280">PWA / Add to Home</text>

  <rect x="28" y="135" width="124" height="48" rx="10" fill="white" stroke="#86efac" stroke-width="1.5"/>
  <text x="90" y="156" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">📷 Camera</text>
  <text x="90" y="173" text-anchor="middle" font-size="10" fill="#6b7280">html5-qrcode</text>

  <!-- Pages -->
  <rect x="208" y="55" width="128" height="56" rx="10" fill="white" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="272" y="77" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">/ Inventory</text>
  <text x="272" y="94" text-anchor="middle" font-size="10" fill="#6b7280">list · swipe · filter</text>

  <rect x="352" y="55" width="128" height="56" rx="10" fill="white" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="416" y="77" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">/add  /edit</text>
  <text x="416" y="94" text-anchor="middle" font-size="10" fill="#6b7280">scan · form · save</text>

  <!-- API Routes -->
  <text x="340" y="148" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b" letter-spacing="1">API ROUTES</text>

  <rect x="208" y="158" width="128" height="44" rx="9" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="272" y="178" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">GET/POST /items</text>
  <text x="272" y="194" text-anchor="middle" font-size="10" fill="#3b82f6">PATCH · DELETE · PUT</text>

  <rect x="352" y="158" width="128" height="44" rx="9" fill="#dbeafe" stroke="#93c5fd" stroke-width="1.2"/>
  <text x="416" y="178" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">GET /lookup</text>
  <text x="416" y="194" text-anchor="middle" font-size="10" fill="#3b82f6">barcode → product info</text>

  <!-- DB -->
  <rect x="262" y="350" width="156" height="52" rx="10" fill="white" stroke="#93c5fd" stroke-width="1.5"/>
  <text x="340" y="373" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">SQLite (dev.db)</text>
  <text x="340" y="390" text-anchor="middle" font-size="10" fill="#6b7280">Prisma v7 + libsql</text>

  <!-- External -->
  <rect x="526" y="55" width="88" height="44" rx="10" fill="white" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="570" y="75" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">Open Food</text>
  <text x="570" y="91" text-anchor="middle" font-size="10" fill="#6b7280">Facts API</text>

  <rect x="526" y="115" width="88" height="44" rx="10" fill="white" stroke="#c4b5fd" stroke-width="1.5"/>
  <text x="570" y="135" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">name · brand</text>
  <text x="570" y="151" text-anchor="middle" font-size="10" fill="#6b7280">category · photo</text>

  <!-- Arrows -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arr-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a78bfa"/>
    </marker>
  </defs>

  <line x1="152" y1="83" x2="206" y2="83" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="152" y1="159" x2="352" y2="83" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)" stroke-dasharray="5,3"/>
  <line x1="272" y1="111" x2="272" y2="156" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="416" y1="111" x2="416" y2="156" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="480" y1="180" x2="524" y2="77" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <line x1="272" y1="202" x2="310" y2="348" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="416" y1="202" x2="370" y2="348" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)" stroke-dasharray="4,3"/>

  <!-- Legend -->
  <g transform="translate(208, 430)">
    <line x1="0" y1="6" x2="24" y2="6" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr-green)"/>
    <text x="30" y="10" font-size="10" fill="#6b7280">user action</text>
    <line x1="110" y1="6" x2="134" y2="6" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
    <text x="140" y="10" font-size="10" fill="#6b7280">data flow</text>
    <line x1="220" y1="6" x2="244" y2="6" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-purple)"/>
    <text x="250" y="10" font-size="10" fill="#6b7280">external API</text>
  </g>
</svg>
