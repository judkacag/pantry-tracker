<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f5f7; font-family: 'Jost', sans-serif; padding: 28px; }
  .grid { display: grid; grid-template-columns: repeat(4, 64px); gap: 16px; }
  .icon { width: 64px; height: 64px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 30px; }
</style>
</head>
<body>
<div class="grid">
  <div class="icon" style="background:#E4EDF1">🥛</div>
  <div class="icon" style="background:#F1E7CD">🌾</div>
  <div class="icon" style="background:#EADDCB">🫘</div>
  <div class="icon" style="background:#F4DAD0">🧂</div>
  <div class="icon" style="background:#F6E3C4">🥘</div>
  <div class="icon" style="background:#EFE0CE">🥨</div>
  <div class="icon" style="background:#D4EBF5">🥤</div>
  <div class="icon" style="background:#F2DEE2">🧁</div>
  <div class="icon" style="background:#E6EDD6">🥬</div>
  <div class="icon" style="background:#FDECEA">🥩</div>
  <div class="icon" style="background:#ECE6DA">🧺</div>
</div>
</body>
</html>
